<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GeoSync — عرض الخريطة التفاعلية في الوقت الفعلي">
    <title>GeoSync — عرض الخريطة</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.75);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #3b82f6;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans Arabic', 'Inter', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-content {
            text-align: center;
        }

        .loading-globe {
            color: var(--primary);
            margin-bottom: 20px;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .loading-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, var(--primary), #a78bfa);
            border-radius: 4px;
            animation: loadBar 1.5s ease-in-out infinite;
        }

        @keyframes loadBar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        /* Map */
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .hidden { display: none !important; }

        /* Top Bar */
        .viewer-topbar {
            position: absolute;
            top: 16px;
            right: 16px;
            left: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
        }

        .viewer-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: var(--radius);
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .viewer-brand svg {
            color: var(--primary);
        }

        .viewer-brand-text h1 {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .viewer-brand-text span {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Layer Switcher */
        .viewer-layers {
            display: flex;
            gap: 6px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 6px;
            border-radius: var(--radius);
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .layer-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .layer-btn:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.08);
        }

        .layer-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Bottom Info Bar */
        .viewer-bottombar {
            position: absolute;
            bottom: 16px;
            right: 16px;
            left: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
        }

        .viewer-coords {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'Inter', monospace;
            pointer-events: auto;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .viewer-stats {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .stat-badge {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .stat-badge .count {
            color: var(--primary);
            font-weight: 600;
        }

        /* Zoom Controls */
        .viewer-zoom {
            position: absolute;
            bottom: 80px;
            left: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .zoom-btn:first-child { border-radius: var(--radius) var(--radius) 0 0; }
        .zoom-btn:last-child { border-radius: 0 0 var(--radius) var(--radius); }

        .zoom-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            color: white;
        }

        /* Live indicator */
        .live-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-live 2s infinite;
        }

        @keyframes pulse-live {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .toast {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: toastIn 0.3s ease;
            border-left: 4px solid var(--primary);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Popup styling */
        .leaflet-popup-content-wrapper {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .leaflet-popup-tip {
            background: rgba(30, 41, 59, 0.95);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-globe">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                    <path d="M2 12h20"/>
                </svg>
            </div>
            <h1 class="loading-title">GeoSync</h1>
            <p class="loading-subtitle">جاري تحميل الخريطة...</p>
            <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        </div>
    </div>

    <!-- Main Viewer -->
    <div id="app" class="hidden">
        <!-- Map -->
        <div id="map"></div>

        <!-- Top Bar -->
        <div class="viewer-topbar">
            <div class="viewer-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                    <path d="M2 12h20"/>
                </svg>
                <div class="viewer-brand-text">
                    <h1>GeoSync</h1>
                    <span><span class="live-dot"></span> مباشر — عرض الخريطة</span>
                </div>
            </div>

            <div class="viewer-layers">
                <button class="layer-btn active" data-layer="street">شوارع</button>
                <button class="layer-btn" data-layer="satellite">قمر صناعي</button>
                <button class="layer-btn" data-layer="dark">مظلم</button>
                <button class="layer-btn" data-layer="terrain">تضاريس</button>
            </div>
        </div>

        <!-- Zoom Controls -->
        <div class="viewer-zoom">
            <button class="zoom-btn" id="zoom-in">+</button>
            <button class="zoom-btn" id="zoom-out">−</button>
        </div>

        <!-- Bottom Bar -->
        <div class="viewer-bottombar">
            <div class="viewer-coords" id="coords-display">0.0000, 0.0000</div>
            <div class="viewer-stats">
                <div class="stat-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    علامات: <span class="count" id="marker-count">0</span>
                </div>
                <div class="stat-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/></svg>
                    طبقات: <span class="count" id="layer-count">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Toast system
        window.showToast = (message, isError = false) => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.style.borderLeft = '4px solid #ef4444';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Initialize Map
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([20, 0], 3);

        L.control.attribution({ position: 'bottomright' }).addTo(map);

        // Tile Layers
        const tileLayers = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19, attribution: '© OpenStreetMap'
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19, attribution: '© Esri'
            }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19, attribution: '© CARTO'
            }),
            terrain: L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/terrain/{z}/{x}/{y}{r}.png', {
                maxZoom: 18, attribution: 'Stamen Design'
            })
        };

        let currentTile = tileLayers.street;
        currentTile.addTo(map);

        // Layer Switcher
        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.dataset.layer;
                if (tileLayers[name]) {
                    map.removeLayer(currentTile);
                    currentTile = tileLayers[name];
                    currentTile.addTo(map);
                    document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }
            });
        });

        // Zoom Controls
        document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
        document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

        // Coords Display
        map.on('mousemove', (e) => {
            document.getElementById('coords-display').textContent = 
                `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
        });

        // Default Marker Icon
        const defaultIcon = L.icon({
            iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
            iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
            shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        // Data storage
        const leafletLayers = new Map();
        const leafletMarkers = new Map();
        const sb = window.supabaseClient;

        // Decompress features
        function decompressFeatures(compressed) {
            if (!compressed) return [];
            const typeMap = { 1: 'Point', 2: 'LineString', 3: 'Polygon', 4: 'MultiPolygon' };
            return compressed.map(c => {
                const type = typeMap[c[0]];
                if (!type) return null;
                return {
                    type: "Feature",
                    geometry: { type: type, coordinates: c[1] },
                    properties: { name: c[2] || '', ...(c[3] || {}) }
                };
            }).filter(Boolean);
        }

        // Render Layer
        function renderLayer(layerData) {
            let leafletLayer = leafletLayers.get(layerData.id);
            const style = {
                color: layerData.style?.color || '#3b82f6',
                weight: layerData.style?.weight || 2,
                opacity: (layerData.style?.opacity || 70) / 100,
                fillColor: layerData.style?.fillColor || '#3b82f6',
                fillOpacity: (layerData.style?.opacity || 70) / 100 * 0.5
            };

            if (leafletLayer) {
                leafletLayer.setStyle(style);
                if (layerData.visible && !map.hasLayer(leafletLayer)) map.addLayer(leafletLayer);
                else if (!layerData.visible && map.hasLayer(leafletLayer)) map.removeLayer(leafletLayer);
                return;
            }

            leafletLayer = L.geoJSON(null, {
                style: style,
                pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                    radius: 8, fillColor: style.fillColor, color: style.color,
                    weight: style.weight, opacity: style.opacity, fillOpacity: style.fillOpacity
                }),
                onEachFeature: (feature, layer) => {
                    if (feature.properties?.name) {
                        layer.bindPopup(`<strong>${feature.properties.name}</strong>`);
                    }
                }
            });

            if (layerData.visible !== false) leafletLayer.addTo(map);
            leafletLayers.set(layerData.id, leafletLayer);

            let features = layerData.features || [];
            if (features.length > 0 && Array.isArray(features[0])) {
                features = decompressFeatures(features);
            }
            if (features.length > 0) {
                leafletLayer.addData({ type: "FeatureCollection", features: features });
            }
        }

        // Render Marker
        function renderMarker(data) {
            let marker = leafletMarkers.get(data.id);
            const popup = `<div style="font-family:'Noto Sans Arabic',sans-serif;">
                <h4 style="margin:0 0 5px 0;">${data.title || 'علامة'}</h4>
                <p style="margin:0;color:#94a3b8;">${data.description || ''}</p>
            </div>`;

            if (marker) {
                marker.setLatLng([data.lat, data.lng]);
                marker.getPopup().setContent(popup);
            } else {
                marker = L.marker([data.lat, data.lng], { icon: defaultIcon }).addTo(map);
                marker.bindPopup(popup);
                leafletMarkers.set(data.id, marker);
            }
        }

        function updateStats() {
            document.getElementById('layer-count').textContent = leafletLayers.size;
            document.getElementById('marker-count').textContent = leafletMarkers.size;
        }

        function fitAllLayers() {
            try {
                const active = Array.from(leafletLayers.values()).filter(l => map.hasLayer(l));
                if (active.length === 0) return;
                const group = new L.FeatureGroup(active);
                const bounds = group.getBounds();
                if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });
            } catch(e) {}
        }

        // Fetch initial data
        async function loadData() {
            try {
                const { data: layers } = await sb.from('layers').select('*');
                if (layers) {
                    layers.forEach(renderLayer);
                    if (layers.length > 0) fitAllLayers();
                }

                const { data: markers } = await sb.from('markers').select('*');
                if (markers) markers.forEach(renderMarker);

                updateStats();
            } catch(err) {
                console.error("Error loading data:", err);
                window.showToast("فشل تحميل البيانات", true);
            }
        }

        // Setup Realtime Subscriptions
        function setupRealtime() {
            sb.channel('viewer:layers')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'layers' }, payload => {
                    if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                        renderLayer(payload.new);
                    } else if (payload.eventType === 'DELETE') {
                        const ll = leafletLayers.get(payload.old.id);
                        if (ll) { map.removeLayer(ll); leafletLayers.delete(payload.old.id); }
                    }
                    updateStats();
                })
                .subscribe();

            sb.channel('viewer:markers')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, payload => {
                    if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                        renderMarker(payload.new);
                    } else if (payload.eventType === 'DELETE') {
                        const m = leafletMarkers.get(payload.old.id);
                        if (m) { map.removeLayer(m); leafletMarkers.delete(payload.old.id); }
                    }
                    updateStats();
                })
                .subscribe();
        }

        // Boot
        loadData();
        setupRealtime();

        // Hide loading screen
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            const app = document.getElementById('app');
            if (loader && app) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    app.classList.remove('hidden');
                    map.invalidateSize();
                }, 500);
            }
        }, 1000);
    });
    </script>
</body>
</html>
